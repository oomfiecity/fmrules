rules:
  - name: Cross-field OR
    from: vendor.com
    match:
      any:
        - subject: Invoice
        - subject: Receipt
        - body: Your order
    file_in: Receipts

  - name: Nested any under all
    from: vendor.com
    match:
      all:
        - any:
            - subject: Autopay
            - subject: Payment
        - any:
            - body: failed
            - body: declined
    file_in: Receipts

  - name: Single-leaf match
    from: vendor.com
    match:
      from: vendor.co.uk
    file_in: Receipts

  - name: Match with text and list
    match:
      any:
        - text: promotional
        - list: marketing.example.com
    file_in: Receipts
