rules:
  - name: Subject any nested
    from: shop.com
    subject:
      any: [Order, Receipt, Invoice]
    file_in: Receipts

  - name: Subject all nested
    from: tickets.com
    subject:
      all: [confirm, refund]
    file_in: Tickets

  - name: Subject any and all combined
    from: shop.com
    subject:
      any: [Receipt, Invoice]
      all: [paid]
    file_in: Receipts

  - name: From list nested
    from:
      any: [a.com, b.com]
    file_in: Receipts

  - name: Plural sugar still works
    from: shop.com
    subjects: [Order, Receipt]
    file_in: Receipts

  - name: All sugar still works
    from: shop.com
    subject_all: [paid, receipt]
    file_in: Receipts

  - name: Sugar and singular merge in one layer
    from: shop.com
    subject: Confirmation
    subjects: [Order, Receipt]
    file_in: Receipts
