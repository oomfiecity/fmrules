defaults:
  from: anthropic.com
  use: [simplelogin]

archetypes:
  alert:
    file_in: Account alerts

rules:
  - name: Anthropic Claude login links
    subject: Secure link to log in to Claude
    file_in: Login Codes

  - archetype: alert
    name: Anthropic account alerts
    subjects:
      - Your subscription access has been paused
      - welcome to the pro plan

  - name: Anthropic marketing spam
    subjects: [Introducing, New in Claude]
    mark_spam: true
    mark_read: true
    discard: true
    stop: true
