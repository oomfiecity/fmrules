name: Action smoke test

# Smoke keys off `Release` completing, not raw pushes. Why: `install.sh`
# resolves `version: latest` via `gh api .../releases/latest`. On the first
# push to a fresh repo (or any push that happens before Release publishes
# binaries on a tag push) there is no release to fetch and the smoke fails
# with HTTP 404. Running after `Release` completes removes the race.
on:
  workflow_run:
    workflows: ['Release']
    types: [completed]
  pull_request:
    paths:
      - 'action/**'
      - '.github/workflows/action-smoke.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    # Skip when `Release` didn't succeed — no new binaries to smoke.
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - id: fmrules
        uses: ./action
        with:
          rules-dir: tests/fixtures/valid/13-1-minimal-rule
          version: latest
          # Smoke compiles a fixture every CI run; we don't want those
          # disposable compiles spawning GitHub Releases on this repo.
          release: 'false'

      - name: Assert outputs
        shell: bash
        run: |
          set -euo pipefail
          echo "version=${{ steps.fmrules.outputs.version }}"
          echo "changed=${{ steps.fmrules.outputs.changed }}"
          echo "output-path=${{ steps.fmrules.outputs.output-path }}"
          test -f "${{ steps.fmrules.outputs.output-path }}"
          jq empty "${{ steps.fmrules.outputs.output-path }}"
          if [ "${{ steps.fmrules.outputs.changed }}" != "true" ]; then
            echo "::error::Expected changed=true on first compile of fan-out fixture."
            exit 1
          fi
